<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OMX Baltic 10 – Redaguojamas Portfelis</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #222536; --border: #2e3148;
      --accent: #4f80ff; --green: #22c55e; --text: #e8eaf6; --muted: #8b92b4; --radius: 12px;
    }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 32px 16px; }
    h1 { text-align: center; margin-bottom: 4px; font-size: 1.6rem; }
    .subtitle { text-align: center; color: var(--muted); margin-bottom: 30px; font-size: 0.9rem; }
    
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; max-width: 1000px; margin: 0 auto 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    
    .controls-row { display: flex; align-items: center; justify-content: space-between; gap: 20px; flex-wrap: wrap; margin-bottom: 15px; }
    .input-group { display: flex; align-items: center; gap: 10px; }
    .portfolio-input { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 1.2rem; padding: 8px; width: 140px; outline: none; border: 1px solid var(--border); }
    
    .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }
    
    .method-toggle { display: flex; background: var(--surface2); padding: 4px; border-radius: 8px; border: 1px solid var(--border); }
    .method-toggle button { background: transparent; border: none; color: var(--muted); padding: 6px 12px; cursor: pointer; border-radius: 6px; font-weight: 600; transition: 0.2s; }
    .method-toggle button.active { background: var(--accent); color: white; }

    .btn-reset { background: #331a1a; color: #ff4f4f; border: 1px solid #552222; padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: 0.2s; }
    .btn-reset:hover { background: #441a1a; border-color: #ff4f4f; }

    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    thead th { padding: 12px; text-align: right; color: var(--muted); border-bottom: 2px solid var(--border); font-size: 0.75rem; text-transform: uppercase; }
    thead th:first-child { text-align: left; }
    tbody tr { border-bottom: 1px solid var(--border); cursor: pointer; transition: 0.2s; }
    tbody tr:hover { background: rgba(255, 255, 255, 0.03); }
    td { padding: 14px 12px; text-align: right; }
    td:first-child { text-align: left; }

    .ticker { font-weight: 700; color: var(--accent); }
    .cap-badge { background: rgba(239,68,68,0.15); color: #ef4444; font-size: 0.65rem; padding: 2px 5px; border-radius: 4px; margin-left: 5px; font-weight: 800; }
    .weight-bar-wrap { display: flex; align-items: center; gap: 8px; justify-content: flex-end; }
    .weight-bar { width: 50px; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .weight-bar-fill { height: 100%; background: var(--accent); transition: width 0.3s; }
    .weight-bar-fill.capped { background: #ef4444; }

    .price-input { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 6px 8px; width: 80px; text-align: right; outline: none; }
    tfoot td { font-weight: 600; border-top: 2px solid var(--border); padding-top: 20px; font-size: 1rem; }

    /* Modal */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 100; backdrop-filter: blur(4px); }
    .modal { background: var(--surface); border: 1px solid var(--border); padding: 25px; border-radius: var(--radius); width: 90%; max-width: 400px; }
    .modal h2 { margin-bottom: 20px; font-size: 1.2rem; color: var(--text); }
    .modal-field { margin-bottom: 15px; }
    .modal-field label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 6px; }
    .modal-field input { width: 100%; background: var(--surface2); border: 1px solid var(--border); padding: 10px; border-radius: 6px; color: var(--text); outline: none; }
    .modal-actions { display: flex; gap: 10px; margin-top: 25px; }
    .btn { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
    .btn-save { background: var(--accent); color: white; }
    .btn-cancel { background: var(--surface2); color: var(--text); }
  </style>
</head>
<body>

<h1>OMX Baltic 10 Portfelis</h1>
<p class="subtitle">Individualus portfelio valdymas ir skaičiavimai</p>

<div class="card">
  <div class="controls-row">
    <div class="input-group">
      <label>Suma (€):</label>
      <input id="portfolioInput" class="portfolio-input" type="number" value="10000">
    </div>
    
    <div class="btn-group">
        <div class="method-toggle">
          <button id="btnFF" class="active" onclick="setMethod('FF')">Free Float</button>
          <button id="btnFull" onclick="setMethod('Full')">Pilna Kap.</button>
        </div>
        <button class="btn-reset" onclick="resetData()">Atstatyti pradinius</button>
    </div>
  </div>
</div>

<div class="card">
  <table>
    <thead>
      <tr>
        <th>Įmonė</th>
        <th>Kaina (€)</th>
        <th id="capHeader">Rinkos kap. (M€)</th>
        <th>Svoris</th>
        <th>Suma (€)</th>
        <th>Kiekis</th>
      </tr>
    </thead>
    <tbody id="resultsBody"></tbody>
    <tfoot>
      <tr>
        <td colspan="4" style="text-align: right; color: var(--muted);">Iš viso investuojama:</td>
        <td id="foot-invested" colspan="2"></td>
      </tr>
      <tr>
        <td colspan="4" style="text-align: right; color: var(--muted);">Likutis (grynieji):</td>
        <td id="foot-remaining" colspan="2" style="color: var(--green)"></td>
      </tr>
    </tfoot>
  </table>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">Redaguoti įmonę</h2>
    <div class="modal-field"><label>Ticker</label><input type="text" id="editTicker"></div>
    <div class="modal-field"><label>Pavadinimas</label><input type="text" id="editName"></div>
    <div class="modal-field"><label>Visos akcijos (Mln.)</label><input type="number" step="0.01" id="editTotal"></div>
    <div class="modal-field"><label>Laisvos akcijos (Mln.)</label><input type="number" step="0.01" id="editFF"></div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeModal()">Atšaukti</button>
      <button class="btn btn-save" onclick="saveEdit()">Išsaugoti</button>
    </div>
  </div>
</div>

<script>
  const defaultData = [
    { ticker: 'IGN1L', name: 'Ignitis grupė', totalShares: 72.39, freeFloatShares: 18.10, price: 21.8 },
    { ticker: 'LHV1T', name: 'LHV Group', totalShares: 327.86, freeFloatShares: 177.21, price: 3.475 },
    { ticker: 'TKM1T', name: 'Tallinna Kaubamaja', totalShares: 40.73, freeFloatShares: 12.10, price: 9.73 },
    { ticker: 'TSM1T', name: 'Tallinna Sadam', totalShares: 263.00, freeFloatShares: 86.70, price: 1.43 },
    { ticker: 'TAL1T', name: 'Tallink Grupp', totalShares: 743.57, freeFloatShares: 195.37, price: 0.616 },
    { ticker: 'SAB1L', name: 'Šiaulių bankas', totalShares: 652.40, freeFloatShares: 546.63, price: 0.884 },
    { ticker: 'MRK1T', name: 'Merko Ehitus', totalShares: 17.70, freeFloatShares: 4.20, price: 28.35 },
    { ticker: 'CPA1T', name: 'Coop Pank', totalShares: 103.66, freeFloatShares: 43.51, price: 2.28 },
    { ticker: 'TEL1L', name: 'Telia Lietuva', totalShares: 582.61, freeFloatShares: 69.04, price: 2.07 },
    { ticker: 'INF1T', name: 'Infortar', totalShares: 21.17, freeFloatShares: 2.16, price: 46.1 }
  ];

  let companies = JSON.parse(localStorage.getItem('omx_v3_data')) || JSON.parse(JSON.stringify(defaultData));
  let currentMethod = 'FF';
  let editingIndex = null;
  const CAP = 0.15;

  function setMethod(m) {
    currentMethod = m;
    document.getElementById('btnFF').classList.toggle('active', m === 'FF');
    document.getElementById('btnFull').classList.toggle('active', m === 'Full');
    document.getElementById('capHeader').textContent = m === 'FF' ? 'FF Rinkos kap. (M€)' : 'Pilna Rinkos kap. (M€)';
    updateResults();
  }

  function resetData() {
    if (confirm("Ar tikrai norite atstatyti pradinius duomenis? Visi jūsų pakeitimai bus ištrinti.")) {
        localStorage.removeItem('omx_v3_data');
        companies = JSON.parse(JSON.stringify(defaultData));
        updateResults();
    }
  }

  function openEdit(index) {
    editingIndex = index;
    const c = companies[index];
    document.getElementById('editTicker').value = c.ticker;
    document.getElementById('editName').value = c.name;
    document.getElementById('editTotal').value = c.totalShares;
    document.getElementById('editFF').value = c.freeFloatShares;
    document.getElementById('modalOverlay').style.display = 'flex';
  }

  function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }

  function saveEdit() {
    companies[editingIndex].ticker = document.getElementById('editTicker').value;
    companies[editingIndex].name = document.getElementById('editName').value;
    companies[editingIndex].totalShares = parseFloat(document.getElementById('editTotal').value) || 0;
    companies[editingIndex].freeFloatShares = parseFloat(document.getElementById('editFF').value) || 0;
    localStorage.setItem('omx_v3_data', JSON.stringify(companies));
    closeModal();
    updateResults();
  }

  function updatePrice(index, val) {
    companies[index].price = parseFloat(val) || 0;
    localStorage.setItem('omx_v3_data', JSON.stringify(companies));
    updateResults();
  }

  function calcWeights() {
    const mcaps = companies.map(c => (currentMethod === 'FF' ? c.freeFloatShares : c.totalShares) * c.price);
    const totalMcap = mcaps.reduce((a, b) => a + b, 0);
    let weights = mcaps.map(v => v / totalMcap);
    let capped = new Array(10).fill(false);

    for (let iter = 0; iter < 10; iter++) {
      let excess = 0, uncappedSum = 0;
      weights.forEach((w, i) => {
        if (w > CAP) { excess += (w - CAP); weights[i] = CAP; capped[i] = true; }
        else if (!capped[i]) { uncappedSum += w; }
      });
      if (excess <= 0.00001) break;
      weights = weights.map((w, i) => !capped[i] ? w + (excess * (w / uncappedSum)) : w);
    }
    return { weights, mcaps, capped };
  }

  function updateResults() {
    const portfolio = parseFloat(document.getElementById('portfolioInput').value) || 0;
    const { weights, mcaps, capped } = calcWeights();
    const tbody = document.getElementById('resultsBody');
    tbody.innerHTML = '';
    let totalInvested = 0;

    companies.forEach((c, i) => {
      const w = weights[i];
      const targetEur = portfolio * w;
      const q = Math.floor(targetEur / c.price);
      const actualEur = q * c.price;
      totalInvested += actualEur;

      const tr = document.createElement('tr');
      tr.onclick = (e) => { if(e.target.tagName !== 'INPUT') openEdit(i); };
      tr.innerHTML = `
        <td><span class="ticker">${c.ticker}</span>${capped[i] ? '<span class="cap-badge">CAP</span>' : ''}<br><span style="font-size:0.7rem;color:var(--muted)">${c.name}</span></td>
        <td><input type="number" class="price-input" value="${c.price}" step="0.001" onclick="event.stopPropagation()" oninput="updatePrice(${i}, this.value)"></td>
        <td>${mcaps[i].toFixed(1)}</td>
        <td>
          <div class="weight-bar-wrap">
            <span>${(w*100).toFixed(2)}%</span>
            <div class="weight-bar"><div class="weight-bar-fill ${capped[i]?'capped':''}" style="width:${(w/0.15*100)}%"></div></div>
          </div>
        </td>
        <td style="font-weight:700">${targetEur.toLocaleString('lt-LT', {minimumFractionDigits:2, maximumFractionDigits:2})} €</td>
        <td>${q.toLocaleString('lt-LT')} vnt.</td>
      `;
      tbody.appendChild(tr);
    });

    document.getElementById('foot-invested').textContent = totalInvested.toLocaleString('lt-LT', {minimumFractionDigits: 2}) + ' €';
    const remaining = portfolio - totalInvested;
    document.getElementById('foot-remaining').textContent = remaining.toLocaleString('lt-LT', {minimumFractionDigits: 2}) + ' €';
  }

  document.getElementById('portfolioInput').oninput = updateResults;
  updateResults();
</script>
</body>
</html>
